# Redis Performance Optimized Configuration for Windows
#
# This configuration file provides optimized settings for Redis on Windows.
# Use it as a starting point and adjust based on your workload.
#
# Usage:
#   redis-server redis.windows-performance.conf
#   RedisService.exe run -c redis.windows-performance.conf
#

# === Network ===
port 6379
bind 127.0.0.1
tcp-backlog 511
tcp-keepalive 60
timeout 0

# === General ===
daemonize no
pidfile ""
loglevel notice
databases 16

# === I/O Threading (IMPORTANT: 4+ core systems) ===
# I/O threads can significantly improve throughput for non-pipelined workloads.
# Set to number of CPU cores minus 1 (minimum 1, maximum 128).
# For 4-core systems: io-threads 3
# For 8-core systems: io-threads 7
# NOTE: Match with --threads in redis-benchmark when testing.
io-threads 4
io-threads-do-reads yes

# === Memory Management ===
# Set maxmemory based on your system RAM (leave room for OS and other processes)
# maxmemory 4gb

# Eviction policy: allkeys-lru evicts least recently used keys when memory is full
# maxmemory-policy allkeys-lru

# Higher sample count = better LRU accuracy but slightly more CPU
maxmemory-samples 10

# === Lazy Freeing (Reduces latency spikes) ===
# Enable background memory reclamation for better latency
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

# === Background Tasks ===
# Higher hz = more frequent background tasks (key expiration, etc.)
# Range: 1-500 (default: 10). Values >100 not recommended.
hz 50

# Dynamic hz adapts to number of connected clients
dynamic-hz yes

# === Persistence (Latency-optimized settings) ===
# Disable RDB snapshots for maximum performance (data will be lost on restart)
# Comment out to enable persistence
save ""

# If persistence is needed, use these settings:
# save 900 1
# save 300 10
# save 60 10000

# RDB settings
rdbcompression yes
rdbchecksum yes
rdb-save-incremental-fsync yes

# AOF settings (if persistence is enabled)
appendonly no
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-rewrite-incremental-fsync yes

# === Client Settings ===
maxclients 10000

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# === Data Structure Optimization ===
hash-max-listpack-entries 512
hash-max-listpack-value 64
list-max-listpack-size -2
list-compress-depth 0
set-max-intset-entries 512
set-max-listpack-entries 128
set-max-listpack-value 64
zset-max-listpack-entries 128
zset-max-listpack-value 64

# === Security ===
# Require authentication in production
# requirepass your-strong-password-here

# === Windows-Specific Notes ===
# 1. Active defragmentation (activedefrag) is NOT supported on Windows
#    because it requires jemalloc memory allocator.
# 2. Use forward slashes or double backslashes for paths in Windows.
# 3. For Cygwin paths: /cygdrive/c/path/to/data
# 4. For native Windows paths: C:/path/to/data or C:\\path\\to\\data

# === Memory Allocator Limitations ===
# Windows builds use libc malloc instead of jemalloc (Linux default).
# This means:
# - No active defragmentation support
# - Higher memory fragmentation (~10-30% more)
# - No MEMORY DOCTOR jemalloc-specific features
